<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill:#f8f9fa; stroke:#333; stroke-width:2; rx:12; }
    .text { font-size:18px; font-family:Arial, "PingFang SC", sans-serif; text-anchor:middle; }
    .arrow { stroke:#333; stroke-width:2; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <rect class="box" x="260" y="30" width="380" height="60"/>
  <text class="text" x="450" y="67">不可信输入：host / filepath</text>

  <line class="arrow" x1="450" y1="90" x2="450" y2="130"/>

  <rect class="box" x="260" y="130" width="380" height="60"/>
  <text class="text" x="450" y="167">判据：字符串拼接构造命令</text>

  <line class="arrow" x1="450" y1="190" x2="450" y2="230"/>

  <rect class="box" x="260" y="230" width="380" height="60"/>
  <text class="text" x="450" y="267">危险 API：subprocess + shell=True</text>

  <line class="arrow" x1="450" y1="290" x2="450" y2="330"/>

  <rect class="box" x="160" y="330" width="580" height="70"/>
  <text class="text" x="450" y="358">Semgrep 规则对应：</text>
  <text class="text" x="450" y="384">py.command-injection.subprocess-shell-true</text>

  <line class="arrow" x1="450" y1="400" x2="450" y2="440"/>

  <rect class="box" x="220" y="440" width="460" height="60"/>
  <text class="text" x="450" y="477">输出命中：app.py 第134行、第197行</text>
</svg>
